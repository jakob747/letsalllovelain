<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wired Forum</title>
  <style>
    body {
      background: black;
      color: limegreen;
      font-family: 'Courier New', monospace;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .monitor {
      background: #111;
      padding: 25px;
      border-radius: 20px;
      box-shadow: inset 0 0 40px #000, 0 0 40px #00ffcc, 15px 20px 50px #000;
      display: inline-block;
      position: relative;
    }

    .screen {
      width: 640px;
      height: 360px;
      background: #000;
      border: 3px solid #00ffcc;
      border-radius: 12px;
      box-shadow: inset 0 0 25px rgba(0,255,204,0.3), inset 0 0 60px #000;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    /* Retro scanline effect */
    .screen::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,204,0.05),
        rgba(0,255,204,0.05) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
    }

    h2 {
      margin: 0;
      text-align: center;
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc, 0 0 30px violet;
      font-size: 1rem;
      animation: flicker 2s infinite alternate;
    }

    @keyframes flicker {
      from { opacity: 1; }
      to { opacity: 0.8; }
    }

    .window {
      flex: 1;
      background: #000;
      border: 2px solid #00ffcc;
      padding: 10px;
      overflow-y: auto;
      box-shadow: inset 0 0 20px #00ffcc;
      z-index: 1;
    }

    .message { margin: 5px 0; font-size: 0.9rem; }
    .user1 { color: #00ffcc; }
    .user2 { color: violet; }
    .user3 { color: orange; }
    .user4 { color: deepskyblue; }

    .popup {
      background: #000;
      border: 2px solid #00ffcc;
      padding: 15px;
      text-align: center;
      display: none;
      z-index: 2;
    }

    input {
      background: black;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      padding: 5px;
      margin: 5px 0;
      width: 90%;
    }

    .button {
      background: #000;
      border: 1px solid #00ffcc;
      padding: 5px 10px;
      cursor: pointer;
      color: #00ffcc;
      margin-top: 10px;
      text-shadow: 0 0 5px #00ffcc;
      animation: pulse 1.5s infinite;
    }
    .button:hover { background: rgba(0,255,204,0.2); }

    @keyframes pulse {
      0% { box-shadow: 0 0 5px #00ffcc; }
      50% { box-shadow: 0 0 15px violet; }
      100% { box-shadow: 0 0 5px #00ffcc; }
    }
  </style>
</head>
<body>
  <div class="monitor">
    <div class="screen">
      <h2>WIRED FORUM</h2>
      <div class="window" id="window">
        <p id="welcome">Welcome to the Wired Forum...</p>
      </div>
      <div class="popup" id="authPopup">
        <h3>Authentication</h3>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <div class="button" onclick="signIn()">Sign In</div>
        <div class="button" onclick="signUp()">Sign Up</div>
      </div>
      <div class="button" onclick="goBack()">⬅ Back</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { firebaseConfig } from "./config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const windowDiv = document.getElementById("window");
    const welcome = document.getElementById("welcome");
    const authPopup = document.getElementById("authPopup");

    setTimeout(() => {
      welcome.style.display = "none";
      authPopup.style.display = "block";
      loadMessages(false);
    }, 2000);

    let currentUser = null;

    async function signUp() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      if(user && pass) {
        // Check if username already exists
        const q = query(collection(db, "users"), where("user","==",user));
        const snapshot = await getDocs(q);
        if(!snapshot.empty) {
          alert("Username already exists. Choose another.");
          return;
        }
        await addDoc(collection(db, "users"), { user, pass });
        alert("Account created. Please sign in.");
      } else {
        alert("Enter username and password.");
      }
    }

    async function signIn() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      if(user && pass) {
        const q = query(collection(db, "users"), where("user","==",user), where("pass","==",pass));
        const snapshot = await getDocs(q);
        if(!snapshot.empty) {
          currentUser = user;
          authPopup.style.display = "none";
          loadMessages(true);
        } else {
          alert("Invalid credentials.");
        }
      }
    }

    async function loadMessages(loggedIn) {
      const querySnapshot = await getDocs(collection(db, "forumPosts"));
      windowDiv.innerHTML = "";
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const colorClass = assignColor(data.user);
        windowDiv.innerHTML += `<div class="message ${colorClass}"><strong>@${data.user}:</strong> ${data.text}</div>`;
      });
      if(loggedIn) {
        windowDiv.innerHTML += `
          <input type="text" id="newMsg" placeholder="Type a message...">
          <div class="button" onclick="postMessage()">Post</div>
        `;
      } else {
        windowDiv.innerHTML += `<p style="color:#ff0044;">Log in or sign up to post.</p>`;
      }
    }

    async function postMessage() {
      const text = document.getElementById("newMsg").value.trim();
      if(text && currentUser) {
        await addDoc(collection(db, "forumPosts"), { user: currentUser, text });
        document.getElementById("newMsg").value = "";
        loadMessages(true);
      }
    }

    function assignColor(user) {
      const colors = ["user1","user2","user3","user4"];
      const index = Math.abs(hashCode(user)) % colors.length;
    }
    
    function hashCode(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      return hash;
    }

    // Back button
    window.goBack = function() { 
      window.location.href = "inwired.html"; 
    };

    // Expose functions globally
    window.signIn = signIn;
    window.signUp = signUp;
    window.postMessage = postMessage;
  </script>
</body>
</html>
