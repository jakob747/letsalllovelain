<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wired Forum</title>
  <style>
    body { background: black; color: #0f0; font-family: monospace; }
    #login, #forum { display: none; }
    textarea { width: 100%; height: 60px; }
    button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 5px; }
  </style>
</head>
<body>
  <h2>Wired Forum</h2>

  <!-- Login screen -->
  <div id="login">
    <p>Enter username and password to continue:</p>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button id="loginBtn">Login</button>
  </div>

  <!-- Forum screen -->
  <div id="forum">
    <h3>Anonymous Forum</h3>
    <div id="posts"></div>
    <textarea id="newPost" placeholder="Write something..."></textarea>
    <button id="postBtn">Post</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { firebaseConfig } from "./config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const loginDiv = document.getElementById("login");
    const forumDiv = document.getElementById("forum");
    const loginBtn = document.getElementById("loginBtn");
    const postBtn = document.getElementById("postBtn");

    // Show login on page load
    loginDiv.style.display = "block";

    loginBtn.addEventListener("click", () => {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      if (user && pass) {
        loginDiv.style.display = "none";
        forumDiv.style.display = "block";
        loadPosts();
      } else {
        alert("Enter both username and password");
      }
    });

    async function loadPosts() {
      const querySnapshot = await getDocs(collection(db, "posts"));
      const postsDiv = document.getElementById("posts");
      postsDiv.innerHTML = "";
      querySnapshot.forEach((doc) => {
        postsDiv.innerHTML += `<p>${doc.data().text}</p>`;
      });
    }

    postBtn.addEventListener("click", async () => {
      const text = document.getElementById("newPost").value;
      if (text.trim() !== "") {
        await addDoc(collection(db, "posts"), { text });
        document.getElementById("newPost").value = "";
        loadPosts();
      }
    });
  </script>
</body>
</html>
