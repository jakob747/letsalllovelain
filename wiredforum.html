<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wired Forum</title>
  <style>
    body {
      background: black;
      color: limegreen;
      font-family: monospace;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .monitor {
      background: #222;
      padding: 25px;
      border-radius: 20px;
      box-shadow: inset 0 0 40px #000, 0 0 40px #00ffcc, 15px 20px 50px #000;
      display: inline-block;
      position: relative;
    }

    .screen {
      width: 640px;
      height: 360px;
      background: #111;
      border: 8px solid #000;
      border-radius: 12px;
      box-shadow: inset 0 0 25px rgba(0,255,204,0.3), inset 0 0 60px #000;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    h2 {
      margin: 0;
      text-align: center;
      color: #00ffcc;
      text-shadow: 0 0 10px #00ffcc;
      font-size: 1rem;
    }

    .window {
      flex: 1;
      background: #000;
      border: 2px solid #00ffcc;
      padding: 10px;
      overflow-y: auto;
      box-shadow: inset 0 0 20px #00ffcc;
    }

    .message { margin: 5px 0; font-size: 0.9rem; }
    .user1 { color: #00ffcc; }
    .user2 { color: violet; }
    .user3 { color: orange; }
    .user4 { color: deepskyblue; }

    .popup {
      background: #000;
      border: 2px solid #00ffcc;
      padding: 15px;
      text-align: center;
      display: none;
    }

    input {
      background: black;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      padding: 5px;
      margin: 5px 0;
      width: 90%;
    }

    .button {
      background: #000;
      border: 1px solid #00ffcc;
      padding: 5px 10px;
      cursor: pointer;
      color: #00ffcc;
      margin-top: 10px;
    }
    .button:hover { background: rgba(0,255,204,0.2); }
  </style>
</head>
<body>
  <div class="monitor">
    <div class="screen">
      <h2>WIRED FORUM</h2>
      <div class="window" id="window">
        <p id="welcome">Welcome to the Wired Forum...</p>
      </div>
      <div class="popup" id="authPopup">
        <h3>Sign In / Sign Up</h3>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <div class="button" onclick="signIn()">Enter</div>
      </div>
      <div class="button" onclick="goBack()">⬅ Back</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { firebaseConfig } from "./config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const windowDiv = document.getElementById("window");
    const welcome = document.getElementById("welcome");
    const authPopup = document.getElementById("authPopup");

    // Show welcome then popup
    setTimeout(() => {
      welcome.style.display = "none";
      authPopup.style.display = "block";
    }, 2000);

    let currentUser = null;

    async function signIn() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      if(user && pass) {
        currentUser = user;
        authPopup.style.display = "none";
        loadMessages();
        showMessage(user, "joined the forum.", "user1");
      } else {
        alert("Enter credentials.");
      }
    }

    async function loadMessages() {
      const querySnapshot = await getDocs(collection(db, "forumPosts"));
      windowDiv.innerHTML = "";
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const colorClass = assignColor(data.user);
        windowDiv.innerHTML += `<div class="message ${colorClass}"><strong>@${data.user}:</strong> ${data.text}</div>`;
      });
      // Add input for posting
      windowDiv.innerHTML += `
        <input type="text" id="newMsg" placeholder="Type a message...">
        <div class="button" onclick="postMessage()">Post</div>
      `;
    }

    async function postMessage() {
      const text = document.getElementById("newMsg").value.trim();
      if(text && currentUser) {
        await addDoc(collection(db, "forumPosts"), { user: currentUser, text });
        document.getElementById("newMsg").value = "";
        loadMessages();
      }
    }

    function showMessage(user, text, colorClass) {
      windowDiv.innerHTML += `<div class="message ${colorClass}"><strong>@${user}:</strong> ${text}</div>`;
    }

    function assignColor(user) {
      const colors = ["user1","user2","user3","user4"];
      const index = Math.abs(hashCode(user)) % colors.length;
      return colors[index];
    }

    function hashCode(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      return hash;
    }

    window.goBack = function() {
      window.location.href = "inwired.html";
    }
    window.signIn = signIn;
    window.postMessage = postMessage;
  </script>
</body>
</html>
